<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Society Services Directory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1a73e8',
            success: '#10b981',
            bot: '#e8f0fe',
            vendor: '#fef3c7'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
  <div id="app" class="max-w-4xl mx-auto h-screen flex flex-col">
    
    <!-- Auth Screen -->
    <div id="auth-screen" class="flex-1 flex flex-col justify-center p-8 max-w-md mx-auto space-y-6 bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl">
      <div class="text-center">
        <div class="w-20 h-20 bg-primary rounded-3xl mx-auto mb-6 flex items-center justify-center">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
        </div>
        <h2 class="text-3xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent mb-2">Society Services</h2>
        <p class="text-gray-600 text-lg">Enter details to access directory</p>
      </div>
      <div class="space-y-4">
        <input type="text" id="user-name" class="w-full p-5 border-2 border-gray-200 rounded-2xl focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all duration-300" placeholder="Your Full Name" />
        <input type="tel" id="user-mobile" class="w-full p-5 border-2 border-gray-200 rounded-2xl focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all duration-300" placeholder="Your 10-digit Mobile" />
        <button id="auth-submit" class="w-full bg-gradient-to-r from-primary to-blue-600 text-white py-5 px-8 rounded-2xl font-bold text-lg shadow-xl hover:shadow-2xl hover:scale-105 transform transition-all duration-300">
          Enter Directory →
        </button>
      </div>
      <p id="auth-error" class="text-red-500 text-sm text-center hidden font-medium"></p>
    </div>

    <!-- Main Directory Screen -->
    <div id="directory-screen" class="flex-1 flex flex-col hidden bg-white/90 backdrop-blur-xl">
      
      <!-- Top Navigation Tabs -->
      <div class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-10">
        <div class="flex space-x-2">
          <button id="chat-tab" class="flex-1 py-3 px-4 rounded-xl font-semibold text-sm transition-all duration-200">
            💬 Chat Search
          </button>
          <button id="category-tab" class="flex-1 py-3 px-4 bg-primary text-white rounded-xl font-semibold text-sm shadow-lg transition-all duration-200">
            📂 Categories
          </button>
        </div>
        <div class="mt-2 text-xs text-gray-500 text-center">
          Last updated: <span id="last-updated">Live</span>
        </div>
      </div>

      <!-- Chat Tab Content -->
      <div id="chat-tab-content" class="flex-1 flex flex-col">
        <div id="chat-header" class="bg-gradient-to-r from-primary to-blue-600 text-white p-6 text-center rounded-b-3xl mx-6 -mt-6">
          <h3 class="text-xl font-bold mb-1">Ask Anything</h3>
          <p class="text-blue-100 text-sm opacity-90">Try: "plumber Tower A" or "9876543210"</p>
        </div>
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-4 scrollbar-thin scrollbar-thumb-gray-300"></div>
        <div id="chat-input-area" class="p-6 bg-gray-50 border-t border-gray-200">
          <div class="flex gap-3">
            <input type="text" id="chat-input" class="flex-1 p-4 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none placeholder-gray-500" placeholder="Type your query..." />
            <button id="chat-send" class="bg-primary hover:bg-blue-600 text-white p-4 rounded-2xl shadow-md transition-all duration-200 flex-shrink-0">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-2-9-9 2 2 9z"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Category Tab Content -->
      <div id="category-tab-content" class="flex-1 overflow-y-auto p-6 hidden">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-8">
          <!-- Categories will be populated by JS -->
        </div>
        <!-- Vendor List will be populated here -->
        <div id="vendor-list" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
